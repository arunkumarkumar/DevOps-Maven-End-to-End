# ── SonarQube Configuration ───────────────────────────────────────────────────
# This file configures the SonarQube scanner for this project.
# The sonar.host.url and sonar.login are passed at runtime via Harness secrets.
# Never put the token value in this file.

sonar.projectKey=my-app
sonar.projectName=my-app
sonar.projectVersion=1.0.0

# Source directories to scan
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java binaries — points to compiled classes
sonar.java.binaries=target/classes

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions — skip generated code and static assets
sonar.exclusions=**/generated/**,**/static/**,**/templates/**
sonar.test.exclusions=**/test/**

# Coverage report location (generated by maven surefire + jacoco)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
