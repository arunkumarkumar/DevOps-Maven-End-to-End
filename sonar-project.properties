# ── SonarQube Configuration ───────────────────────────────────────────────────
# This file configures the SonarQube scanner for this project.
# The sonar.host.url and sonar.login are passed at runtime via Harness secrets.
# Never put the token value in this file.

sonar.organization=arunkumarkumar
sonar.projectKey=arunkumarkumar_DevOps-Maven-End-to-End
